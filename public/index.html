<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>くろおにくん</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="page-header">
    <h1>大江観光案内AI　くろおにくん</h1>
    <div class="top-icon">
      <img src="kurooni_icon.png" alt="アイコン">
    </div>
  </header>

  <div class="app">
    <h1>タップで案内を開始</h1>

    <div class="media-box" id="mediaBox">
      <img id="thumbnail" src="kurooni_seisi.jpg" alt="再生用画像">
      <video id="video" src="kurooni_kutipaku.mp4" loop muted playsinline></video>
    </div>

    <p id="status">画像をタップしてください</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
